
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Datos Dataddo</title>
</head>
<body>

<h2>Datos desde Dataddo</h2>

<table border="1" style="width:100%; border-collapse: collapse;" id="tabla"></table>

<script>
fetch("/.netlify/functions/dataddo")
  .then(res => res.text())
  .then(csv => {
    const rows = csv.split("\n").map(r => r.split(","));
    const table = document.getElementById("tabla");

    rows.forEach(row => {
      const tr = document.createElement("tr");

      row.forEach(col => {
        const td = document.createElement("td");
        td.textContent = col;
        tr.appendChild(td);
      });

      table.appendChild(tr);
    });
  })
  .catch(error => {
    document.body.innerHTML += "<p>Error cargando datos</p>";
    console.error(error);
  });
</script>

</body>
</html>
