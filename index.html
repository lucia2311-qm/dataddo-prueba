
<!DOCTYPE html>
<html>
<head>
  <title>Datos Dataddo</title>
</head>
<body>

<h2>Datos desde Dataddo</h2>
<table border="1" id="tabla"></table>

<script>
fetch("https://data.eu-west-1.aws.dataddo.com/v1.0/get/6942b1ee3dc1bc38690e091d?type=csv")
  .then(res => res.text())
  .then(csv => {
    const rows = csv.split("\n").map(r => r.split(","));
    const table = document.getElementById("tabla");

    rows.forEach(row => {
      const tr = document.createElement("tr");
      row.forEach(col => {
        const td = document.createElement("td");
        td.textContent = col;
        tr.appendChild(td);
      });
      table.appendChild(tr);
    });
  });
</script>

</body>
</html>
