

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Datos Dataddo</title>

  <style>
    body { font-family: Arial; background:#f4f6f8; padding:20px; }
    h2 { text-align:center; }

    .filtros {
      width:90%;
      margin:auto;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:15px;
    }

    .filtros input {
      padding:6px;
      border:1px solid #ccc;
    }

    table {
      width:90%;
      margin:auto;
      border-collapse:collapse;
      background:white;
    }

    th, td {
      border:1px solid #ccc;
      padding:8px;
    }

    th { background:#007BFF; color:white; }

    button {
      margin: 10px auto;
      display:block;
      padding:10px;
      background:#28a745;
      color:white;
      border:none;
    }
  </style>
</head>

<body>

<h2>Datos desde Dataddo</h2>

<div class="filtros" id="filtros"></div>

<button onclick="exportar()">Exportar CSV</button>

<table id="tabla"></table>

<script>
const columnasDeseadas = [
  "date",
  "project_id",
  "create _uid",
  "task_id",
  "employee_id",
  "department_id",
  "time_type_id"
];

let datos = [];

fetch("https://6a352679e64a2ab9c906125b--super-hamster-d9edaa.netlify.app/.netlify/functions/dataddo")
.then(res => res.text())
.then(text => {

  if (!text || text.includes("Error")) {
    throw new Error("No hay datos del endpoint");
  }

  const rows = text.split("\n").filter(r => r.trim() !== "").map(r => r.split(","));

  const headers = rows[0];

  // debug
  console.log("HEADERS:", headers);

  const indices = columnasDeseadas.map(col => headers.indexOf(col));

  // chequear columnas
  if (indices.includes(-1)) {
    alert("Alguna columna no coincide con el CSV");
    console.log("Indices:", indices);
  }

  // crear filtros
  const filtrosDiv = document.getElementById("filtros");

  columnasDeseadas.forEach(col => {
    const input = document.createElement("input");
    input.placeholder = col;
    input.oninput = aplicarFiltros;
    input.id = col;
    filtrosDiv.appendChild(input);
  });

  // filtrar filas con project id
  const indexProject = headers.indexOf("project id");

  datos = rows.slice(1).filter(r => r[indexProject]);

  // reducir columnas
  datos = datos.map(row => indices.map(i => row[i]));

  render(datos);

})
.catch(err => {
  document.body.innerHTML += "<p>❌ Error trayendo datos</p>";
  console.error(err);
});


function aplicarFiltros() {
  let filtrados = datos;

  columnasDeseadas.forEach((col, i) => {
    const val = document.getElementById(col).value.toLowerCase();

    if (val) {
      filtrados = filtrados.filter(r => 
        r[i] && r[i].toLowerCase().includes(val)
      );
    }
  });

  render(filtrados);
}


function render(data) {
  const table = document.getElementById("tabla");
  table.innerHTML = "";

  if (data.length === 0) {
    table.innerHTML = "<tr><td>No hay datos</td></tr>";
    return;
  }

  const headerRow = document.createElement("tr");

  columnasDeseadas.forEach(c => {
    const th = document.createElement("th");
    th.textContent = c;
    headerRow.appendChild(th);
  });

  table.appendChild(headerRow);

  data.forEach(row => {
    const tr = document.createElement("tr");

    row.forEach(cell => {
      const td = document.createElement("td");
      td.textContent = cell;
      tr.appendChild(td);
    });

    table.appendChild(tr);
  });
}


function exportar() {
  let csv = columnasDeseadas.join(",") + "\n";

  document.querySelectorAll("#tabla tr").forEach((tr, i) => {
    if (i === 0) return;

    const fila = Array.from(tr.children).map(td => td.innerText);
    csv += fila.join(",") + "\n";
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "datos.csv";
  a.click();
}
</script>

</body>
</html>
